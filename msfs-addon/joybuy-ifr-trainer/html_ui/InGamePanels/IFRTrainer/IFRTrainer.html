<body class="border-box">
    <ingamepanel-ifrtrainer>
        <ingame-ui id="IFRTrainer" panel-id="PANEL_IFR_TRAINER" title="IFR Trainer Map"
                   class="ingameUiFrame panelInvisible" content-fit="true"
                   min-width="360" min-height="260">

                <iframe id="IFRTrainerIframe" src="" frameborder="0"></iframe>
                <div id="IFRTrainerOffline">
                    <div class="msg-title">IFR Trainer app not running</div>

                        then reopen this panel.
                    </div>
                </div>
            </div>
        </ingame-ui>
    </ingamepanel-ifrtrainer>
