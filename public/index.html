<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IFR Trainer — MSFS 2024</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 26 26'%3E%3Cpolygon points='13,4 20.8,8.5 20.8,17.5 13,22 5.2,17.5 5.2,8.5' fill='none' stroke='%2338bdf8' stroke-width='2'/%3E%3Ccircle cx='13' cy='13' r='2' fill='%2338bdf8'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="map"></div>

  <!-- Top status / data bar -->
  <header id="databar">
    <div class="brand">IFR&nbsp;TRAINER</div>
    <div class="datafield"><span class="label">GS</span><span id="d-gs" class="value">---</span><span class="unit">kt</span></div>
    <div class="datafield"><span class="label">ALT</span><span id="d-alt" class="value">-----</span><span class="unit">ft</span></div>
    <div class="datafield"><span class="label">HDG</span><span id="d-hdg" class="value">---</span><span class="unit">°M</span></div>
    <div class="datafield"><span class="label">TRK</span><span id="d-trk" class="value">---</span><span class="unit">°T</span></div>
    <div class="datafield"><span class="label">VS</span><span id="d-vs" class="value">----</span><span class="unit">fpm</span></div>
    <div id="conn" class="conn disconnected" title="">OFFLINE</div>
  </header>

  <!-- Side control panel -->
  <aside id="panel">
    <section>
      <h3>Map</h3>
      <label><input type="checkbox" id="opt-follow" checked> Follow aircraft</label>
      <label><input type="checkbox" id="opt-rings" checked> Range rings</label>
      <label>Base map
        <select id="opt-base">
          <option value="chart" selected>IFR chart (plain)</option>
          <option value="dark">Dark tiles</option>
          <option value="osm">OpenStreetMap</option>
        </select>
      </label>
    </section>
    <section>
      <h3>Layers</h3>
      <label><input type="checkbox" id="lyr-vor" checked> VOR</label>
      <label><input type="checkbox" id="lyr-ndb" checked> NDB</label>
      <label><input type="checkbox" id="lyr-wpt" checked> Waypoints</label>
      <label><input type="checkbox" id="lyr-apt" checked> Airports</label>
      <label><input type="checkbox" id="lyr-labels" checked> Labels</label>
    </section>
    <section>
      <h3>Flight track</h3>
      <div class="row">
        <button id="btn-clear">Clear</button>
        <a class="button" href="/track.geojson" download>GeoJSON</a>
        <a class="button" href="/track.kml" download>KML</a>
      </div>
      <div id="track-stats" class="muted">0 points · 0.0 NM</div>
    </section>
    <section id="fixinfo" class="hidden">
      <h3>Selected fix</h3>
      <div id="fix-name" class="fix-name">—</div>
      <div class="fixgrid">
        <span class="label">BRG to fix</span><span id="fix-brg" class="value">---°</span>
        <span class="label">Radial from</span><span id="fix-radial" class="value">---°</span>
        <span class="label">DIST</span><span id="fix-dist" class="value">--.- NM</span>
        <span class="label">Freq</span><span id="fix-freq" class="value">—</span>
      </div>
      <button id="btn-fix-clear">Deselect</button>
    </section>
  </aside>

  <button id="panel-toggle" title="Toggle panel">☰</button>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="js/symbols.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
